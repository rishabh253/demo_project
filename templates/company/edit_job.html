{% extends 'base.html' %}
{% block title %}Edit Job – {{ job.title }}{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold text-primary">
    <i class="bi bi-pencil-square me-2"></i>Edit Job
  </h3>
  <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white fw-semibold">
        <i class="bi bi-briefcase-fill me-2"></i>Edit: {{ job.title }}
      </div>
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control"
                   value="{{ job.title }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Job Description</label>
            <textarea name="description" class="form-control" rows="5">{{ job.description or '' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Required Skills <small class="text-muted">(comma-separated)</small></label>
            <input type="text" name="required_skills" class="form-control"
                   value="{{ job.required_skills or '' }}">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Experience Required</label>
              <input type="text" name="experience" class="form-control"
                     value="{{ job.experience or '' }}"
                     placeholder="e.g. 0-2 years / Fresher">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" name="location" class="form-control"
                     value="{{ job.location or '' }}"
                     placeholder="e.g. Bangalore / Remote">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Minimum Salary (LPA)</label>
              <input type="number" name="salary_min" class="form-control"
                     step="0.1" min="0"
                     value="{{ job.salary_min or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Maximum Salary (LPA)</label>
              <input type="number" name="salary_max" class="form-control"
                     step="0.1" min="0"
                     value="{{ job.salary_max or '' }}">
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Application Deadline</label>
              <input type="date" name="deadline" class="form-control"
                     value="{{ job.deadline.strftime('%Y-%m-%d') if job.deadline else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Status</label>
              <select name="status" class="form-select">
                <option value="active" {% if job.status == 'active' %}selected{% endif %}>Active</option>
                <option value="closed" {% if job.status == 'closed' %}selected{% endif %}>Closed</option>
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>Save Changes
            </button>
            <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>

    {% if not job.is_approved %}
    <div class="alert alert-warning mt-3 small">
      <i class="bi bi-hourglass-split me-1"></i>
      This job is <strong>pending admin approval</strong> and is not yet visible to students.
    </div>
    {% endif %}
  </div>
</div>

{% endblock %}
